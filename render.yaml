services:
  - type: web
    name: ieva-fitness-bot
    env: python
    region: frankfurt
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ieva-fitness-db
          property: connectionString

databases:
  - name: ieva-fitness-db
    region: frankfurt
    plan: free
